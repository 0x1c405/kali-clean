# Terminal capability
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Behavior
set -g mouse on
set -g history-limit 5000
set -g base-index 0
setw -g pane-base-index 0
set -g set-clipboard on
setw -g mode-keys emacs

# Status bar (Tokyo Night)
set -g status-position bottom
set -g status-style "bg=#32344a,fg=#8a98cf"
set -g status-left "[#S] "
set -g status-left-length 20
set -g status-left-style "bg=#32344a,fg=#8a98cf"
set -g status-right ""
set -g status-right-style "bg=#32344a,fg=#8a98cf"
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
set -g window-status-current-style "bg=#a9b1d6,fg=#1a1b26"

# Pane borders
set -g pane-border-style "fg=#32344a"
set -g pane-active-border-style "fg=#7aa2f7"

# Kill without confirm
bind-key & kill-window
bind-key x kill-pane

# Splits / new window inherit current pane's path
unbind "%"
unbind '"'
bind "\\" split-window -h -c "#{pane_current_path}"
bind "-"  split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes (h/j/k/l, repeatable)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Zoom toggle
bind -r m resize-pane -Z

# Copy-mode -> system clipboard via xclip
bind -T copy-mode Space send-keys -X begin-selection
bind -T copy-mode Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Plugins (TPM)
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "omerxx/tmux-sessionx"

# Initialize TPM (must stay at the bottom)
run "~/.tmux/plugins/tpm/tpm"
